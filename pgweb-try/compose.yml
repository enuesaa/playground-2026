services:
  pgweb:
    image: sosedoff/pgweb
    ports:
      - 8081:8081
    environment:
      - PGWEB_SESSIONS=1
      # - PGWEB_DATABASE_URL=postgres://postgres:postgres@db/app?sslmode=disable
    volumes:
      - ./bookmarks:/home/pgweb/.pgweb/bookmarks
    depends_on:
      - db
  
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5433:5432
    volumes:
      - ./dbinit:/docker-entrypoint-initdb.d
  
